<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroPlay | A Fluid Sanctuary</title>
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "surface-container": "#e5e9eb",
                  "secondary": "#6a37d4",
                  "surface-dim": "#d0d5d8",
                  "primary-container": "#6ba0ff",
                  "on-secondary-fixed-variant": "#5f28c8",
                  "tertiary-fixed-dim": "#5af0b4",
                  "tertiary-container": "#6bffc1",
                  "inverse-on-surface": "#9a9d9f",
                  "primary": "#0058b9",
                  "on-secondary": "#f8f0ff",
                  "on-error": "#ffefee",
                  "on-surface-variant": "#595c5e",
                  "error-container": "#fb5151",
                  "on-tertiary-fixed": "#004b33",
                  "surface-bright": "#f5f7f9",
                  "primary-fixed": "#6ba0ff",
                  "background": "#f5f7f9",
                  "secondary-fixed": "#dac9ff",
                  "surface": "#f5f7f9",
                  "surface-tint": "#0058b9",
                  "on-background": "#2c2f31",
                  "surface-container-high": "#dfe3e6",
                  "on-primary-fixed": "#000000",
                  "on-secondary-fixed": "#40009b",
                  "on-primary": "#f0f2ff",
                  "tertiary-fixed": "#6bffc1",
                  "inverse-surface": "#0b0f10",
                  "primary-dim": "#004da3",
                  "surface-container-low": "#eef1f3",
                  "on-error-container": "#570008",
                  "surface-container-highest": "#d9dde0",
                  "on-tertiary-container": "#006042",
                  "on-surface": "#2c2f31",
                  "outline": "#747779",
                  "on-tertiary": "#c8ffe1",
                  "surface-container-lowest": "#ffffff",
                  "primary-fixed-dim": "#5392fb",
                  "inverse-primary": "#5694fe",
                  "on-primary-container": "#00214e",
                  "secondary-fixed-dim": "#ceb9ff",
                  "error-dim": "#9f0519",
                  "secondary-container": "#dac9ff",
                  "tertiary-dim": "#005b3f",
                  "outline-variant": "#abadaf",
                  "on-tertiary-fixed-variant": "#006b4a",
                  "on-primary-fixed-variant": "#002a60",
                  "secondary-dim": "#5e26c7",
                  "on-secondary-container": "#5517bf",
                  "surface-variant": "#d9dde0",
                  "error": "#b31b25",
                  "tertiary": "#006948"
                },
                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Manrope"],
                  "label": ["Manrope"]
                },
                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                animation: {
                  'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                  'float': 'float 6s ease-in-out infinite',
                  'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                },
                keyframes: {
                  fadeInUp: {
                    '0%': { opacity: '0', transform: 'translateY(20px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                  },
                  float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-10px)' },
                  }
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .fluid-gradient-btn {
            background: linear-gradient(135deg, #0058b9 0%, #6ba0ff 100%);
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
